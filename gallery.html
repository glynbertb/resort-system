<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Paradise Beach Resort</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, sans-serif;
}

body{
    background:#0a0a0a;
}

/* Header */
header{
    position:fixed;
    width:100%;
    top:0;
    z-index:999;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
}

.container{
    width:90%;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 0;
}

.logo{
    color:#fff;
    font-size:26px;
    font-weight:bold;
    letter-spacing:1px;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-size:16px;
    position:relative;
}

nav ul li a::after{
    content:'';
    position:absolute;
    width:0%;
    height:2px;
    left:0;
    bottom:-5px;
    background:#00e5ff;
    transition:0.4s;
}

nav ul li a:hover::after{
    width:100%;
}

/* Gallery Grid */
.gallery{
    display: flex;
    flex-wrap: wrap;
    margin-top:100px; /* offset for fixed header */
}

.gallery-item{
    position: relative;
    width:33.33%;
    overflow: hidden;
}

.gallery-item img{
    width: 100%;
    display: block;
    transition: transform 0.5s, filter 0.5s;
    border-radius: 15px;
}

/* Hover zoom + glow */
.gallery-item:hover img{
    transform: scale(1.1);
    filter: brightness(1.3);
    box-shadow: 0 0 25px #00c6ff;
}

/* Caption overlay */
.gallery-item .caption{
    position: absolute;
    bottom: 0;
    left:0;
    width: 100%;
    background: rgba(0,0,0,0.5);
    color: #00c6ff;
    text-align: center;
    padding: 10px 0;
    font-size: 18px;
    opacity: 0;
    transition: opacity 0.4s;
}

.gallery-item:hover .caption{
    opacity: 1;
}

/* Responsive */
@media(max-width:768px){
    .gallery-item{
        width:50%;
    }
}
@media(max-width:480px){
    .gallery-item{
        width:100%;
    }
}
</style>
</head>
<body>
<header>
    <nav class="container">
        <div class="logo">Paradise Beach Resort 🏖️</div>
        <ul>
            <li><a href="home.html">🏠Home</a></li>
            <li><a href="room.html">🛏️Rooms</a></li>
            <li><a href="gallery.html">🖼️Gallery</a></li>
            <li><a href="reservation.html">📅Reserve</a></li>
            <li><a href="contact.html">📞Contact</a></li>
        </ul>
    </nav>
</header>

<!-- Gallery -->
<div class="gallery">
    <div class="gallery-item">
        <img src="1.jpg" alt="Beach View">
        <div class="caption">Beach View</div>
    </div>
    <div class="gallery-item">
        <img src="2.jpg" alt="Ocean Sunset">
        <div class="caption">Ocean Sunset</div>
    </div>
    <div class="gallery-item">
        <img src="3.jpg" alt="Luxury Room">
        <div class="caption">Luxury Room</div>
    </div>
    <div class="gallery-item">
        <img src="4.jpg" alt="Resort Pool">
        <div class="caption">Resort Pool</div>
    </div>
    <div class="gallery-item">
        <img src="5.jpg" alt="Sunset Lounge">
        <div class="caption">Sunset Lounge</div>
    </div>
    <div class="gallery-item">
        <img src="6.jpg" alt="Tropical Garden">
        <div class="caption">Tropical Garden</div>
    </div>
</div>
</body>
</html>
