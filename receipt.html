<!DOCTYPE html>
<html>
<head>
<title>Booking Receipt</title>
<style>
body{
    background:#0a0a0a;
    color:white;
    font-family:'Segoe UI', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.receipt-box{
    background:rgba(0,0,0,0.7);
    padding:50px;
    border-radius:20px;
    border:2px solid #00c6ff;
    box-shadow:0 0 30px rgba(0,198,255,0.6);
    width:450px;
    text-align:center;
}

.receipt-box h2{
    color:#00c6ff;
    margin-bottom:20px;
}

.receipt-box p{
    line-height:1.6;
    margin-bottom:30px;
    color:#ccc;
}

.btn{
    padding:15px 35px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    text-decoration:none;
    border-radius:50px;
    font-size:16px;
}
.hero-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    overflow:hidden;
    z-index:-1;
}

.hero-bg .slide{
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    animation:fade 16s infinite;
    animation-fill-mode:both;
}

/* Individual slides */
.hero-bg .slide:nth-child(1){
    background-image:url('24.jpg');
    animation-delay:0s;
}
.hero-bg .slide:nth-child(2){
    background-image:url('23.jpg');
    animation-delay:4s;
}
.hero-bg .slide:nth-child(3){
    background-image:url('22.jpg');
    animation-delay:8s;
}
.hero-bg .slide:nth-child(4){
    background-image:url('25.jpg');
    animation-delay:12s;
}

/* Gradient overlay on top of slides */
.hero-bg::after{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6));
    z-index:1;
}

@keyframes fade{
    0%{opacity:0;}
    5%{opacity:1;}
    25%{opacity:1;}
    30%{opacity:0;}
    100%{opacity:0;}
}


</style>
</head>

<body>
 <!-- HERO BACKGROUND ANIMATION -->
    <div class="hero-bg">
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
    </div>

<div class="receipt-box">
    <h2>Booking Confirmed ✅</h2>
    <p>
        Thank you for choosing Paradise Beach Resort.
        <br><br>
        Your reservation request has been successfully received.
        <br>
        Our team will contact you shortly to confirm your booking details.
    </p>

    <a href="home.html" class="btn">Return to Home</a>
</div>


</body>
</html>
